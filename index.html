<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tate Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="controls">
        <button id="masterStartBtn" class="btn btn--primary header-btn btn--master" type="button" aria-label="Master Start" title="Master Start">🔇</button>

        <button type="button" id="bpmSettingsBtn" class="btn header-btn" aria-label="BPM and Bluetooth latency" title="BPM & latency">🎵</button>

        <button id="playBtn" class="btn btn--play header-btn header-btn--transport" type="button" aria-label="Play/Pause" title="Play/Pause (Space)">▶️</button>

        <div class="divider"></div>

        <button id="exportBtn" class="btn header-btn" type="button" aria-label="Export project JSON" title="Export">📤</button>
        <button id="importBtn" class="btn header-btn" type="button" aria-label="Import project JSON" title="Import">📥</button>
        <button id="resetBtn" class="btn header-btn" type="button" aria-label="Reset project" title="Reset">🗑</button>
      </div>
    </header>

    <main class="main">
      <section class="panel panel--grow">
        <div class="screenframe">
          <div id="phraseView" class="screen screen--active">
            <div id="tracker" class="tracker" aria-label="Tracker grid" role="grid"></div>
          </div>

          <div id="songView" class="screen" aria-label="Song view"></div>
          <div id="chainView" class="screen" aria-label="Chain view"></div>
          <div id="instrumentView" class="screen" aria-label="Instrument view">
            <div class="instrument">
              <div class="instrument__section">
                <div class="instrument__title">PU1 / PU2</div>
                <div class="instrument__grid2">
                  <div class="control-group">
                    <label class="label" for="pulse1Width">PU1 Width</label>
                    <select id="pulse1Width" class="input input--select">
                      <option value="12.5">12.5%</option>
                      <option value="25">25%</option>
                      <option value="50" selected>50%</option>
                      <option value="75">75%</option>
                    </select>
                  </div>
                  <div class="control-group">
                    <label class="label" for="pulse2Width">PU2 Width</label>
                    <select id="pulse2Width" class="input input--select">
                      <option value="12.5">12.5%</option>
                      <option value="25">25%</option>
                      <option value="50" selected>50%</option>
                      <option value="75">75%</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="instrument__section">
                <div class="instrument__title">WAV / NOI</div>
                <div class="instrument__grid2">
                  <div class="control-group">
                    <label class="label" for="wavType">WAV</label>
                    <select id="wavType" class="input input--select">
                      <option value="triangle" selected>Triangle</option>
                      <option value="sawtooth">Saw</option>
                      <option value="square">Square</option>
                      <option value="sine">Sine</option>
                    </select>
                  </div>
                  <div class="control-group">
                    <label class="label" for="noiseType">NOI</label>
                    <select id="noiseType" class="input input--select">
                      <option value="white" selected>White</option>
                      <option value="pink">Pink</option>
                      <option value="brown">Metallic</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="instrument__section">
                <div class="instrument__title">Mixer</div>
                <div class="mixer">
                  <div class="mixer__row">
                    <div class="mixer__label mono">PU1</div>
                    <input id="mixVol0" class="mixer__slider" type="range" min="0" max="100" step="1" value="90" />
                    <div id="mixVol0Val" class="mixer__val mono">90</div>
                  </div>
                  <div class="mixer__row">
                    <div class="mixer__label mono">PU2</div>
                    <input id="mixVol1" class="mixer__slider" type="range" min="0" max="100" step="1" value="90" />
                    <div id="mixVol1Val" class="mixer__val mono">90</div>
                  </div>
                  <div class="mixer__row">
                    <div class="mixer__label mono">WAV</div>
                    <input id="mixVol2" class="mixer__slider" type="range" min="0" max="100" step="1" value="90" />
                    <div id="mixVol2Val" class="mixer__val mono">90</div>
                  </div>
                  <div class="mixer__row">
                    <div class="mixer__label mono">NOI</div>
                    <input id="mixVol3" class="mixer__slider" type="range" min="0" max="100" step="1" value="90" />
                    <div id="mixVol3Val" class="mixer__val mono">90</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="placeholderView" class="screen" aria-live="polite" hidden>
          <div class="placeholder">
            <div id="placeholderTitle" class="placeholder__title">--</div>
            <div class="placeholder__body">Placeholder view (screen switching only).</div>
          </div>
        </div>
      </section>
    </main>

    <div id="settingsOverlay" class="settings-overlay" hidden aria-hidden="true">
      <div class="settings-overlay__panel" role="dialog" aria-labelledby="settingsOverlayTitle" aria-modal="true">
        <h2 id="settingsOverlayTitle" class="settings-overlay__title">Timing</h2>
        <div class="settings-overlay__row">
          <div class="settings-overlay__labelrow">
            <label class="settings-overlay__label" for="settingsBpmSlider">BPM</label>
            <span id="settingsBpmVal" class="settings-overlay__value mono">120</span>
          </div>
          <input id="settingsBpmSlider" class="settings-overlay__range" type="range" min="40" max="300" step="1" aria-valuemin="40" aria-valuemax="300" />
        </div>
        <div id="settingsLatRow" class="settings-overlay__row settings-overlay__row--latency">
          <div class="settings-overlay__labelrow">
            <label class="settings-overlay__label" for="settingsLatSlider">BT compensation</label>
            <span id="settingsLatVal" class="settings-overlay__value mono">0</span>
            <span class="settings-overlay__unit">ms</span>
          </div>
          <span id="settingsLatHint" class="settings-overlay__hint" aria-live="polite"></span>
          <input id="settingsLatSlider" class="settings-overlay__range" type="range" min="0" max="500" step="1" aria-valuemin="0" aria-valuemax="500" />
        </div>
        <div class="settings-overlay__actions">
          <button type="button" id="settingsOverlayDone" class="btn btn--primary">Done</button>
        </div>
      </div>
    </div>

    <div id="importOverlay" class="import-overlay" hidden aria-hidden="true">
      <div class="import-overlay__panel" role="dialog" aria-labelledby="importOverlayTitle" aria-modal="true">
        <h2 id="importOverlayTitle" class="import-overlay__title">Import project</h2>
        <textarea
          id="importOverlayText"
          class="import-overlay__textarea"
          spellcheck="false"
          autocorrect="off"
          autocomplete="off"
          autocapitalize="off"
          rows="14"
          aria-label="Paste project JSON"
        ></textarea>
        <div class="import-overlay__actions">
          <button type="button" id="importOverlayCancel" class="btn">Cancel</button>
          <button type="button" id="importOverlayLoad" class="btn btn--primary">Load</button>
        </div>
      </div>
    </div>

    <div class="nudge-bar" aria-label="Nudge">
      <button class="nudge-bar__btn" type="button" data-nudge="inc" aria-label="Nudge up">+</button>
      <button class="nudge-bar__btn" type="button" data-nudge="dec" aria-label="Nudge down">-</button>
      <button class="nudge-bar__btn" type="button" data-nudge="jump_inc" aria-label="Jump up">⏫</button>
      <button class="nudge-bar__btn" type="button" data-nudge="jump_dec" aria-label="Jump down">⏬</button>
      <button class="nudge-bar__btn" type="button" data-nudge="random" aria-label="Random">R</button>
    </div>

    <!-- Ghost select for native context menu (mobile picker / desktop dropdown) -->
    <select id="cellMenuSelect" class="ghost-select" aria-label="Cell menu">
      <option value="" selected disabled>Cell…</option>
      <option value="copy">Copy</option>
      <option value="paste">Paste</option>
      <option value="delete">Delete</option>
    </select>

    <nav id="navMap" class="navmap" aria-label="Screens">
      <button class="navmap__btn" data-screen="S" type="button" aria-label="Song">S</button>
      <button class="navmap__btn" data-screen="C" type="button" aria-label="Chain">C</button>
      <button class="navmap__btn" data-screen="P" type="button" aria-label="Phrase">P</button>
      <button class="navmap__btn" data-screen="I" type="button" aria-label="Instrument">I</button>
      <button class="navmap__btn" data-screen="T" type="button" aria-label="Table">T</button>
    </nav>

    <div class="statusbar">
      <div id="statusLeft" class="statusbar__left">Ready.</div>
      <div id="statusRight" class="statusbar__right mono">Row -- Col --</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
